version: "3.8"

services:
  freecrawl:
    build: .
    ports:
      - "9100:9100"
    environment:
      - FREECRAWL_ENGINE=auto
      - FREECRAWL_HEADLESS=false
      - FREECRAWL_CHANNEL=chromium
      - FREECRAWL_PORT=9100
      - FREECRAWL_FLARESOLVERR_URL=http://flaresolverr:8191
      # Optional: LLM for extraction/summary
      # - FREECRAWL_LLM_API_KEY=your-key
      # - DEEPSEEK_API_KEY=your-key
      # Optional: Proxy
      # - FREECRAWL_PROXY_URL=http://user:pass@host:port
      # Optional: API auth
      # - FREECRAWL_API_KEY=your-secret
    restart: unless-stopped
    shm_size: "2gb"
    depends_on:
      - flaresolverr

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    restart: unless-stopped
